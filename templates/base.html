<!DOCTYPE html>
<html>
<head><title>DevOps Secure App</title>
<style>body{padding:50px;font-family:Arial;}</style></head>
<body>
    {% with messages=get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <p class="{{ 'msg-success' if 'success' in message.lower() else 'msg-error' }}">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</body>
</html>
